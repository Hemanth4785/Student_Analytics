<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Student Record</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 600px;">
        <div class="card p-4 shadow-sm">
            <h2 class="mb-4">📕 Add New Student Record</h2>
            <form action="/add" method="POST">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="name" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Department</label>
                    <input type="text" name="department" class="form-control" placeholder="e.g., Computer Science" required>
                </div>
                <div class="row">
                    <div class="col mb-3">
                        <label class="form-label">Maths Marks</label>
                        <input type="number" name="Maths_marks" class="form-control" min="0" max="100" required>
                    </div>
                    <div class="col mb-3">
                        <label class="form-label">Chemistry Marks</label>
                        <input type="number" name="Chemistry_marks" class="form-control" min="0" max="100" required>
                    </div>
                    <div class="col mb-3">
                        <label class="form-label">Physics Marks</label>
                        <input type="number" name="Physics_marks" class="form-control" min="0" max="100" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Attendance Percentage (%)</label>
                    <input type="number" name="attendance" class="form-control" step="0.1" min="0" max="100" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Save Student</button>
                <a href="/" class="btn btn-link w-100 text-center mt-2">Back to Dashboard</a>
            </form>
        </div>
    </div>
</body>
</html>
